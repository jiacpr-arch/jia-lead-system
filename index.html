      // Fallback to JSONP batch if fetch fails (mobile)
      apiAddJsonp(data,cb);

    apiAddJsonp(data,cb);

}
function apiAddJsonp(data,cb){
  var BATCH=3;var total=data.length;var errors=[];
  function go(i){
    if(i>=total){cb(errors.length?errors[0]:{success:true,added:total});return}
    var chunk=data.slice(i,Math.min(i+BATCH,total));
    jsonp(API+"?action=add&data="+encodeURIComponent(JSON.stringify(chunk)),function(err){
      if(err)errors.push(err);

    });
